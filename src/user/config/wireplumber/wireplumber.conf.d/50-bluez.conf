monitor.bluez.properties = {
# see: https://pipewire.pages.freedesktop.org/wireplumber/daemon/configuration/bluetooth.html
	#bluez5.roles = [ a2dp_sink a2dp_source bap_sink bap_source ]
	bluez5.codecs = [ aac ldac lc3 ]
	bluez5.default.rate = 48000
	bluez5.a2dp.ldac.quality = "hq" # mq=300kbps, sq=600kbps, hq=900kbps, auto
	bluez5.a2dp.aac.bitratemode = 5 # 0=cbr, 1-5=vbr
}
